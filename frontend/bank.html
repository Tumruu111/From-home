<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bank</title>
  </head>
  <body>
    <h1>Bank</h1>
    <div>
      <h2>Your Balance: <span id="balance">Loading...</span></h2>
    </div>
    <button onclick="logout()">Logout</button>
    <button onclick="deposit()">Deposit</button>
    <input type="number" id="depositAmount" placeholder="Enter amount"/>
    <button onclick="withdraw()">Withdraw</button>
    <input type="number" id="withdrawAmount" placeholder="Enter amount"/>
    <script>
      const balanceEl = document.getElementById("balance");
        const loadBalance = async () => {
        const response = await fetch("http://localhost:3000/bank/balance");
        const data = await response.json();
        balanceEl.textContent = data.balance;
      };
      const logout = () => {
  window.location.href = "/login.html";
};
      const deposit = async () => {
        const response = await fetch("http://localhost:3000/bank/deposit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ amount: 3000 })
        });
        const data = await response.json();
        balanceEl.textContent = data.balance;
      };

      const withdraw = async () => {
        const response = await fetch("http://localhost:3000/bank/withdraw", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ amount: 2000 })
        });
        if (response.ok) {
          const data = await response.json();
          balanceEl.textContent = data.balance;
        } else {
          window.alert("Insufficient funds");
        }
      };
      loadBalance();
    </script>
  </body>
</html>
